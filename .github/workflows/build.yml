name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install easygui pyinstaller

      - name: Build executable
        run: |
          pyinstaller ^
            --onefile ^
            --windowed ^
            --add-data "home.gif;." ^
            --add-data "night.gif;." ^
            --add-data "hall.gif;." ^
            --add-data "field.gif;." ^
            --add-data "her.gif;." ^
            --add-data "1.gif;." ^
            --add-data "2.gif;." ^
            --add-data "3.gif;." ^
            --add-data "4.gif;." ^
            --add-data "5.gif;." ^
            --add-data "6.gif;." ^
            main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: hello-world
          path: dist/*.exe